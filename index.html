<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="">
    <style>
        /* Resets browser margins and hides scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }
        /* Makes the iframe fill the entire viewport */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <script>
        // CONFIGURATION: Edit these values or pass them via URL parameters
        const defaultTargetUrl = "https://deepakmylist.github.io/Collabalist.github.io/"; 
        const defaultTitle = "Collabalist";
        const defaultFavicon = "";

        // Helper function to get URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // Resolve values: Checks URL parameters first, falls back to defaults
        const targetUrl = urlParams.get('url') || defaultTargetUrl;
        const pageTitle = urlParams.get('title') || defaultTitle;
        const faviconUrl = urlParams.get('favicon') || defaultFavicon;

        // Apply Title and Favicon
        document.title = pageTitle;
        document.getElementById('favicon').href = faviconUrl;

        // Create and inject the full-screen iframe
        const iframe = document.createElement('iframe');
        iframe.src = targetUrl;
        
        // Permissions setup: Enables scripts, styles, forms, and same-origin assets
        // Removing the 'sandbox' attribute entirely gives the frame maximum compatibility for JS/TSX builds
        iframe.setAttribute('allow', 'geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb');
        
        // Append to the body
        document.body.appendChild(iframe);
    </script>

</body>
</html>
