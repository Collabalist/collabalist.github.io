<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Page iFrame</title>
  <style>
    /* Remove all default margins, padding, and scrollbars */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <script>
    // Replace the entire body content with an iframe pointing to the target URL
    const targetURL = "https://deepakmylist.github.io/Collabalist/";

    const iframe = document.createElement("iframe");
    iframe.src = targetURL;
    iframe.setAttribute("allowfullscreen", "true");

    // Clear the body and inject the iframe
    document.body.innerHTML = "";
    document.body.appendChild(iframe);
  </script>
</body>
</html>
